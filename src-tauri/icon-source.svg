<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="55%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dx="0" dy="6" result="offsetBlur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect x="80" y="80" width="864" height="864" rx="200" fill="url(#bg)"/>
  <rect x="80" y="80" width="864" height="864" rx="200" fill="url(#sheen)"/>

  <!-- Aura ring: two soft concentric arcs -->
  <g filter="url(#shadow)" fill="none" stroke="#ffffff" stroke-linecap="round">
    <path d="M 280 540 A 240 240 0 1 1 760 540" stroke-width="36" opacity="0.4"/>
    <path d="M 320 560 A 200 200 0 0 1 720 560" stroke-width="40" opacity="0.95"/>
  </g>

  <!-- Checkmark inside the ring -->
  <path d="M 410 540 L 490 620 L 640 470"
        stroke="#ffffff" stroke-width="64" fill="none"
        stroke-linecap="round" stroke-linejoin="round"
        filter="url(#shadow)"/>
</svg>
